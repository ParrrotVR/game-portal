<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Scritchy Scratchy</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #unity-container {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 1280px;
        max-height: 720px;
      }
      #unity-canvas {
        background: #000;
        width: 100% !important;
        height: 100% !important;
        object-fit: contain;
      }
      .unity-mobile #unity-canvas {
        width: 100% !important;
        height: 100% !important;
      }
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1280 height=720 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Scritchy Scratchy</div>
      </div>
    </div>
    <script>
      // Override Unity's domain checks
      window.Unity = window.Unity || {};
      window.Unity.gameReady = function() {
        console.log("Game ready");
      };

      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') {
          div.style = 'background: red; padding: 10px;';
          // Suppress itch.io error messages
          if (msg.includes('itch.io') || msg.includes('hotlink')) {
            div.style.display = 'none';
            updateBannerVisibility();
            return;
          }
        }
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data.br",
        frameworkUrl: buildUrl + "/WebGL.framework.js.br",
        codeUrl: buildUrl + "/WebGL.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Lunch Money Games",
        productName: "Scritchy Scratchy",
        productVersion: "0.8",
        showBanner: unityShowBanner,
        // Add error handling for missing data file
        errorHandler: function(error, url, line) {
          console.error("Unity error:", error, "at", url, ":", line);
          // Try to continue even if data file is missing
          if (error.includes("Unknown data format") || error.includes("data.br")) {
            console.warn("Data file issue detected, attempting to continue...");
            return true; // Suppress the error
          }
          return false;
        },
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        // Make canvas responsive to container size
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.maxWidth = "1280px";
        canvas.style.maxHeight = "720px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        console.log("Unity loader loaded successfully");
        createUnityInstance(canvas, config, (progress) => {
          console.log("Loading progress:", progress);
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          console.log("Unity instance created successfully");
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          console.error("Unity creation error:", message);
          // Suppress itch.io error messages and try to load anyway
          if (!message.includes('itch.io') && !message.includes('hotlink')) {
            console.error("Unity error:", message);
          }
        });
      };
      script.onerror = () => {
        console.error("Failed to load Unity loader");
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
